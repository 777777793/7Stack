name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Configure deployment paths
        shell: bash
        env:
          SITE_URL_OVERRIDE: ${{ vars.SITE_URL }}
          BASE_PATH_OVERRIDE: ${{ vars.BASE_PATH }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          if [ -n "$SITE_URL_OVERRIDE" ]; then
            echo "SITE_URL=$SITE_URL_OVERRIDE" >> "$GITHUB_ENV"
          else
            echo "SITE_URL=https://$REPOSITORY_OWNER.github.io" >> "$GITHUB_ENV"
          fi

          if [ -n "$BASE_PATH_OVERRIDE" ]; then
            echo "BASE_PATH=$BASE_PATH_OVERRIDE" >> "$GITHUB_ENV"
          elif [ "$REPOSITORY_NAME" = "$REPOSITORY_OWNER.github.io" ]; then
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/$REPOSITORY_NAME/" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
